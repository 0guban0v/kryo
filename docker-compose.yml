services:
  tooling:
    image: node:22-alpine
    profiles: ["tooling"]
    working_dir: /workspace
    command: sh -lc "tail -f /dev/null"
    volumes:
      - .:/workspace
      - tooling-pnpm-store:/pnpm/store
      - tooling-node-modules:/workspace/node_modules
      - tooling-demo-node-modules:/workspace/examples/demo-service/node_modules

  kryo-mcp:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      fizzy:
        condition: service_healthy
      campfire:
        condition: service_healthy
      demo-service:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      FIZZY_URL: http://fizzy
      CAMPFIRE_URL: http://campfire
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: streamable-http
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  demo-service:
    build:
      context: .
      dockerfile: examples/demo-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  fizzy:
    image: ghcr.io/basecamp/fizzy:main
    restart: unless-stopped
    ports:
      - "3006:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISABLE_SSL: "true"
      BASE_URL: http://localhost:3006
    volumes:
      - fizzy-data:/rails/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  campfire:
    build:
      context: ../once-campfire
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISABLE_SSL: "true"
    volumes:
      - campfire-data:/rails/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  fizzy-data:
  campfire-data:
  tooling-pnpm-store:
  tooling-node-modules:
  tooling-demo-node-modules:
