services:
  devbox:
    image: kryo-devbox:${KRYO_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: deploy/compose/devbox/Dockerfile
    profiles: ["devbox"]
    working_dir: /workspace
    command: sh -lc "tail -f /dev/null"
    volumes:
      - .:/workspace
      - devbox-pnpm-store:/pnpm/store
      - devbox-node-modules:/workspace/node_modules

  mcp:
    image: kryo-mcp:${KRYO_IMAGE_TAG:-local}
    build:
      context: .
    env_file:
      - ${ENV_FILE}
    restart: unless-stopped
    depends_on:
      fizzy:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      - "3100:3100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/up').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  prometheus:
    image: prom/prometheus@sha256:3b1d5be5c3eef4f027665ddaa3b1a7de8a58d96a0a6de5dd45629afd267ecaf0
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      blackbox-exporter:
        condition: service_started

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./observability/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"

  loki:
    image: grafana/loki@sha256:31628519045e7f28692a7ae73b4a3fd293dccb425585ed5d16ceea3b5c9592e6
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail@sha256:784743d283f71f644e290d7b9fadf5e1edff405d2756974c6e13fa7978c08b64
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
      - -config.expand-env=true
    environment:
      PROMTAIL_COMPOSE_PROJECT_REGEX: ${PROMTAIL_COMPOSE_PROJECT_REGEX:-${COMPOSE_PROJECT_NAME:-kryo}}
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-data:/tmp
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana@sha256:a1701c2180249361737a99a01bc770db39381640e4d631825d38ff4535efa47d
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-grafana-admin@demo.local}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana-admin}
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  fizzy:
    image: ghcr.io/basecamp/fizzy@sha256:eaa3bd9986f0eab9623cb40f06f44992621516c97c0c7a4a947ecd5bf7856233
    restart: unless-stopped
    ports:
      - "3006:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISABLE_SSL: "true"
      BASE_URL: http://localhost:3006
    volumes:
      - fizzy-data:/rails/storage
    networks:
      default:
        aliases:
          - kryo-fizzy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
  gitea:
    image: gitea/gitea@sha256:be0b89adf2fc8657df508303d919c3be33e6413605882919f702177d62960c9a
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      ROOT_URL: ${BOOTSTRAP_GITEA_ROOT_URL}
      DB_TYPE: sqlite3
      INSTALL_LOCK: "true"
      DISABLE_REGISTRATION: "true"
      REQUIRE_SIGNIN_VIEW: "true"
      SECRET_KEY: ${SECRET_KEY_BASE}
    volumes:
      - gitea-data:/var/lib/gitea
    networks:
      default:
        aliases:
          - kryo-gitea
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  fizzy-data:
  gitea-data:
  devbox-pnpm-store:
  devbox-node-modules:
  prometheus-data:
  loki-data:
  promtail-data:
  grafana-data:
