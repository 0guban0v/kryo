services:
  devbox:
    image: kryo-devbox:${KRYO_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: deploy/compose/devbox/Dockerfile
    profiles: ["devbox"]
    working_dir: /workspace
    command: sh -lc "tail -f /dev/null"
    volumes:
      - .:/workspace
      - devbox-pnpm-store:/pnpm/store
      - devbox-node-modules:/workspace/node_modules

  mcp:
    image: kryo-mcp:${KRYO_IMAGE_TAG:-local}
    build:
      context: .
    env_file:
      - ${MCP_RUNTIME_ENV:-deploy/mcp.env}
    restart: unless-stopped
    depends_on:
      fizzy:
        condition: service_healthy
      campfire:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  prometheus:
    image: prom/prometheus:v3.4.2
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      blackbox-exporter:
        condition: service_started

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./observability/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"

  loki:
    image: grafana/loki:3.5.5
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail:3.5.5
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-data:/tmp
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:12.1.1
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  fizzy:
    image: ghcr.io/basecamp/fizzy@sha256:eaa3bd9986f0eab9623cb40f06f44992621516c97c0c7a4a947ecd5bf7856233
    restart: unless-stopped
    ports:
      - "3006:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISABLE_SSL: "true"
      BASE_URL: http://localhost:3006
    volumes:
      - fizzy-data:/rails/storage
    networks:
      default:
        aliases:
          - kryo-fizzy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  campfire:
    image: kryo-campfire:${CAMPFIRE_IMAGE_TAG:-v1.4.3-msgpack}
    build:
      context: ..
      dockerfile: kryo/deploy/compose/campfire/Dockerfile
      args:
        APP_VERSION: ${ONCE_CAMPFIRE_VERSION:-v1.4.3}
        GIT_REVISION: ${ONCE_CAMPFIRE_VERSION:-v1.4.3}
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DISABLE_SSL: "true"
    volumes:
      - campfire-data:/rails/storage
    networks:
      default:
        aliases:
          - kryo-campfire
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  gitea:
    image: gitea/gitea:1.25.5-rootless
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      ROOT_URL: ${BOOTSTRAP_GITEA_ROOT_URL}
      DB_TYPE: sqlite3
      INSTALL_LOCK: "true"
      DISABLE_REGISTRATION: "true"
      REQUIRE_SIGNIN_VIEW: "true"
      SECRET_KEY: ${SECRET_KEY_BASE}
    volumes:
      - gitea-data:/var/lib/gitea
    networks:
      default:
        aliases:
          - kryo-gitea
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  fizzy-data:
  campfire-data:
  gitea-data:
  devbox-pnpm-store:
  devbox-node-modules:
  prometheus-data:
  loki-data:
  promtail-data:
  grafana-data:
