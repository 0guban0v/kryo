apiVersion: apps/v1
kind: Deployment
metadata:
  name: kryo-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kryo-mcp
  template:
    metadata:
      labels:
        app: kryo-mcp
    spec:
      containers:
        - name: kryo-mcp
          image: ghcr.io/your-org/kryo-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          envFrom:
            - configMapRef:
                name: kryo-mcp-config
            # This secret should be created or synchronized by self-hosted Infisical.
            - secretRef:
                name: kryo-mcp-secrets
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
