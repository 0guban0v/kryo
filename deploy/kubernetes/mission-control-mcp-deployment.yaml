apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control-mcp
  template:
    metadata:
      labels:
        app: mission-control-mcp
    spec:
      containers:
        - name: mission-control-mcp
          image: ghcr.io/your-org/mission-control-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          envFrom:
            - configMapRef:
                name: mission-control-mcp-config
            # This secret should be created or synchronized by self-hosted Infisical.
            - secretRef:
                name: mission-control-mcp-secrets
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
