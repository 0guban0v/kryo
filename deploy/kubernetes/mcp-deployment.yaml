apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      serviceAccountName: mcp
      containers:
        - name: mcp
          image: ghcr.io/your-org/kryo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          envFrom:
            - configMapRef:
                name: mcp-config
            # This secret should be synchronized by the Infisical operator.
            - secretRef:
                name: secrets-vault
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
