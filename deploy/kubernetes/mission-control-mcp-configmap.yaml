apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-control-mcp-config
data:
  # Replace these URLs per environment. They are placeholders, not assumed in-cluster defaults.
  FIZZY_URL: http://fizzy.replace-me.svc.cluster.local
  FIZZY_ACCOUNT_ID: "897362094"
  CAMPFIRE_URL: http://campfire.replace-me.svc.cluster.local
  GIT_FORGE_PROVIDER: github
  GITHUB_API_URL: https://api.github.com
  GITHUB_REPO: your-org/mission-control-mcp
  GITHUB_DEFAULT_BRANCH: main
  GITHUB_MERGE_METHOD: squash
  MCP_TRANSPORT: streamable-http
  MCP_HOST: 0.0.0.0
  MCP_PORT: "3100"
  MCP_PATH: /mcp
  MCP_SSE_PATH: /sse
  MCP_SSE_MESSAGES_PATH: /messages
  BOT_WEBHOOK_PATH: /campfire/webhook
  BOT_WEBHOOK_SHARED_SECRET_HEADER: x-mission-control-webhook-secret
  REQUEST_TIMEOUT_MS: "10000"
  LOG_LEVEL: info
