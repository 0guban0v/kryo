name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck root project
        run: pnpm run typecheck

      - name: Build root project
        run: pnpm run build

      - name: Lint workspace
        run: pnpm run lint

      - name: Run workflow tests
        run: pnpm test

      - name: Run demo-service tests
        run: pnpm run demo-service:test

      - name: Build main service container
        run: docker build -t kryo-mcp:test .

      - name: Build demo-service container
        run: docker build -f examples/demo-service/Dockerfile -t kryo-demo-service:test .
