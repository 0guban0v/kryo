global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://mcp:3100/up
        labels:
          service: mcp
      - targets:
          - http://fizzy/up
        labels:
          service: fizzy
      - targets:
          - http://campfire/up
        labels:
          service: campfire
      - targets:
          - http://gitea:3000/api/healthz
        labels:
          service: gitea
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
